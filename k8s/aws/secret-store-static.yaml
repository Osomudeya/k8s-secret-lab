# Use this SecretStore when running ESO on a local cluster (kind, MicroK8s) where
# IRSA is not available. Create a K8s Secret with AWS credentials first, then apply
# this file and point the ExternalSecret to this store (see DEPLOY.md).
#
# kubectl create secret generic aws-eso-credentials -n default \
#   --from-literal=accessKeyID=AKIA... \
#   --from-literal=secretAccessKey=...
# kubectl apply -f k8s/aws/secret-store-static.yaml
#
# Then edit k8s/aws/external-secret.yaml: set secretStoreRef.name to
# "aws-secrets-manager-static" and secretStoreRef.kind to "SecretStore".
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager-static
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-eso-credentials
            key: accessKeyID
          secretAccessKeySecretRef:
            name: aws-eso-credentials
            key: secretAccessKey
