apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
  annotations:
    # Reloader watches this — rolls pods when the secret changes
    secret.reloader.stakater.com/reload: "myapp-database-creds"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          # Image must exist on Docker Hub (or another registry). If not pushed yet:
          #   cd app && docker build -t YOUR_DOCKERHUB_USERNAME/k8s-secrets-lab-app:latest . && docker push YOUR_DOCKERHUB_USERNAME/k8s-secrets-lab-app:latest
          # Then set image below. Otherwise Deployment will stay ImagePullBackOff.
          image: veeno/k8s-secrets-lab-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          # Inject secrets as env vars (simple approach)
          # Production note: these only update on pod restart
          envFrom:
            - secretRef:
                name: myapp-database-creds

          # Volume mount approach (updates without pod restart after kubelet sync)
          volumeMounts:
            - name: db-secret-vol
              mountPath: /etc/secrets
              readOnly: true

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          # Health checks — production standard
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

      volumes:
        - name: db-secret-vol
          secret:
            secretName: myapp-database-creds

---
# LoadBalancer gives you a public URL on EKS (ELB). No port-forward needed.
# On kind/MicroK8s the external IP may stay <pending> unless you install MetalLB.
apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: default
spec:
  selector:
    app: myapp
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
