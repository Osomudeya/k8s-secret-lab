apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-db-secret
  namespace: default
spec:
  # How often ESO polls AWS SM and updates the K8s Secret
  # Production thinking: 1h for stable secrets, 5m for frequently rotated ones
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: myapp-database-creds  # The K8s Secret that gets created
    creationPolicy: Owner        # ESO owns it — deleting ExternalSecret deletes the Secret

    # Add annotation so Reloader triggers a rolling restart on rotation
    template:
      metadata:
        annotations:
          secret.reloader.stakater.com/reload: "myapp-database-creds"

  # Map AWS SM JSON keys → K8s Secret keys
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: prod/myapp/database  # The secret name in AWS SM
        property: username        # The JSON key inside the secret

    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/myapp/database
        property: password

    - secretKey: DB_HOST
      remoteRef:
        key: prod/myapp/database
        property: host

    - secretKey: DB_PORT
      remoteRef:
        key: prod/myapp/database
        property: port
