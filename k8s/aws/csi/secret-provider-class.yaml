# SecretProviderClass for AWS Secrets Manager — use with Secrets Store CSI Driver + AWS provider.
# Same secret as the ESO path: prod/myapp/database (JSON: username, password, host, port).
#
# Prereqs: Install the CSI driver and AWS provider (see docs/CSI-DRIVER-AWS.md).
# EKS: use IRSA on the pod's ServiceAccount. MicroK8s: ensure provider has AWS credentials.
# Provider v2+: jmesPath lives in parameters.objects with objectAlias; secretObjects references aliases.
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-sm-lab
  namespace: default
spec:
  provider: aws
  parameters:
    region: "us-east-1"
    objects: |
      - objectName: "prod/myapp/database"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "DB_USERNAME"
          - path: "password"
            objectAlias: "DB_PASSWORD"
          - path: "host"
            objectAlias: "DB_HOST"
          - path: "port"
            objectAlias: "DB_PORT"
  # Sync individual JSON keys to a K8s Secret so the app can use envFrom.
  secretObjects:
    - secretName: myapp-database-creds
      type: Opaque
      data:
        - objectName: "DB_USERNAME"
          key: DB_USERNAME
        - objectName: "DB_PASSWORD"
          key: DB_PASSWORD
        - objectName: "DB_HOST"
          key: DB_HOST
        - objectName: "DB_PORT"
          key: DB_PORT
