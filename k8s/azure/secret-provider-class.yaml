# Replace AZURE_TENANT_ID, KEY_VAULT_NAME, MANAGED_IDENTITY_CLIENT_ID
# with outputs from: terraform output (in terraform/azure/)

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-provider
  namespace: default
spec:
  provider: azure

  # Sync to a K8s Secret so pods can use env vars (not just volume mounts)
  secretObjects:
    - secretName: myapp-database-creds
      type: Opaque
      data:
        - objectName: db-password
          key: DB_PASSWORD
        - objectName: db-username
          key: DB_USERNAME

  parameters:
    usePodIdentity: "false"
    clientID: "MANAGED_IDENTITY_CLIENT_ID"  # From terraform output
    keyvaultName: "KEY_VAULT_NAME"           # From terraform output
    tenantId: "AZURE_TENANT_ID"             # From: az account show --query tenantId

    objects: |
      array:
        - |
          objectName: db-password
          objectType: secret
          objectVersion: ""     # Empty = always latest version
        - |
          objectName: db-username
          objectType: secret
          objectVersion: ""
