# Rotation test — end-to-end: rotate secret → verify /secrets/compare → restart pod → verify all_match.
# Manual only: run from Actions tab after deploy. Requires EKS + app with LoadBalancer (or set ALB_URL).
name: Rotation test (E2E)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rotation-test.yml'

permissions:
  id-token: write
  contents: read

jobs:
  rotation-test:
    name: Rotate secret and verify
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Get EKS kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME || 'secrets-lab' }} \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Wait for lab ready
        run: |
          kubectl wait --for=condition=ready pod -l app=myapp -n default --timeout=120s
          [ "$(kubectl get externalsecret app-db-secret -n default -o jsonpath='{.status.conditions[0].reason}' 2>/dev/null)" = "SecretSynced" ] || { echo "ExternalSecret not synced"; exit 1; }

      - name: Rotate secret in AWS Secrets Manager
        run: |
          NEW_PASSWORD="rotated-ci-$(date +%s)"
          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_NAME:-prod/myapp/database}" \
            --secret-string "{\"username\":\"dbadmin\",\"password\":\"$NEW_PASSWORD\",\"host\":\"rds.lab.example.com\",\"port\":\"5432\"}" \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}
          echo "NEW_PASSWORD=$NEW_PASSWORD" >> $GITHUB_ENV

      - name: Force ESO sync
        run: |
          kubectl annotate externalsecret app-db-secret force-sync="$(date +%s)" -n default --overwrite
          sleep 10

      - name: Get app URL
        id: app-url
        env:
          ALB_URL: ${{ secrets.ALB_URL }}
        run: |
          if [ -n "${ALB_URL}" ]; then
            APP_URL="${ALB_URL}"
          else
            LB=$(kubectl get svc myapp -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            [ -z "$LB" ] && LB=$(kubectl get svc myapp -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            APP_URL="http://${LB}"
          fi
          [ -z "$APP_URL" ] || [ "$APP_URL" = "http://" ] && { echo "No LoadBalancer address; set ALB_URL secret or ensure Service has external host"; exit 1; }
          echo "url=$APP_URL" >> $GITHUB_OUTPUT

      - name: Wait for rotation_detected (ESO + kubelet can take 60s+)
        env:
          APP_URL: ${{ steps.app-url.outputs.url }}
        run: |
          for i in $(seq 1 24); do
            RESULT=$(curl -sf --connect-timeout 10 "${APP_URL}/secrets/compare" 2>/dev/null || echo "{}")
            if echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('rotation_detected') else 1)" 2>/dev/null; then
              echo "$RESULT" | python3 -m json.tool
              echo "OK: rotation_detected true after ${i}0s"
              exit 0
            fi
            echo "Attempt $i/24: rotation_detected not yet true; waiting 10s..."
            sleep 10
          done
          echo "FAIL: rotation_detected still false after 4 minutes (ESO/kubelet may not have updated volume)"
          exit 1

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment/myapp -n default
          kubectl rollout status deployment/myapp -n default --timeout=120s

      - name: Verify all_match after restart
        env:
          APP_URL: ${{ steps.app-url.outputs.url }}
        run: |
          sleep 5
          RESULT=$(curl -sf --connect-timeout 15 "${APP_URL}/secrets/compare")
          echo "$RESULT" | python3 -m json.tool
          echo "$RESULT" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if not d.get('all_match'):
            print('FAIL: expected all_match true after pod restart')
            sys.exit(1)
          print('OK: all_match true — rotation E2E passed')
          "

      - name: Write summary
        run: |
          echo "## Rotation test passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Rotated secret in AWS SM" >> $GITHUB_STEP_SUMMARY
          echo "2. ESO synced; \`/secrets/compare\` showed \`rotation_detected: true\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Restarted deployment" >> $GITHUB_STEP_SUMMARY
          echo "4. \`/secrets/compare\` showed \`all_match: true\`" >> $GITHUB_STEP_SUMMARY
