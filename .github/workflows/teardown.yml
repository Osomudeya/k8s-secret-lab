# Teardown — Terraform destroy (AWS and optionally Azure).
# Manual only: run from Actions tab. Type "destroy" in the confirmation input to run.
# Does NOT delete the EKS cluster; destroys Terraform-managed resources only.
# When use_eks is true, deletes K8s resources (ExternalSecret, etc.) before destroy.
name: Teardown

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm teardown"
        required: true
      use_eks:
        description: "Use EKS (true) or local cluster (false)"
        required: false
        default: "true"

permissions:
  id-token: write
  contents: read

jobs:
  teardown-aws:
    name: Terraform Destroy — AWS
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: terraform/aws

    steps:
      - uses: actions/checkout@v4

      - name: Confirm teardown
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "Teardown cancelled. You must type 'destroy' in the confirmation input."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Install kubectl
        if: github.event.inputs.use_eks == 'true'
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Get EKS kubeconfig and delete K8s resources (when use_eks)
        if: github.event.inputs.use_eks == 'true'
        run: |
          mkdir -p ~/.kube
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME || 'secrets-lab' }} --region ${{ secrets.AWS_REGION || 'us-east-1' }}
          if ! kubectl get nodes --request-timeout=10s 2>/dev/null; then
            echo "Cluster unreachable (no EKS access for this role). Skipping K8s cleanup; Terraform destroy will still run."
            exit 0
          fi
          kubectl delete externalsecret app-db-secret -n default --ignore-not-found --timeout=30s || true
          kubectl delete secret myapp-database-creds -n default --ignore-not-found --timeout=30s || true
          kubectl delete deployment myapp -n default --ignore-not-found --timeout=60s || true
          kubectl delete service myapp -n default --ignore-not-found --timeout=30s || true
          echo "K8s resources cleaned"

      - name: Set EKS Terraform vars (for destroy)
        if: github.event.inputs.use_eks == 'true'
        run: |
          echo "TF_VAR_create_eks=true" >> $GITHUB_ENV
          echo "TF_VAR_use_eks=true" >> $GITHUB_ENV
          echo "TF_VAR_cluster_name=${{ secrets.EKS_CLUSTER_NAME || 'secrets-lab' }}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        env:
          TF_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
          TF_REGION: ${{ secrets.TF_BACKEND_REGION || secrets.AWS_REGION || 'us-east-1' }}
          TF_DYNAMO: ${{ secrets.TF_BACKEND_DYNAMO }}
        run: |
          if [ -n "$TF_BUCKET" ]; then
            terraform init -reconfigure \
              -backend-config=bucket="$TF_BUCKET" \
              -backend-config=key=k8s-secrets-lab/terraform.tfstate \
              -backend-config=region="${TF_REGION}" \
              -backend-config=dynamodb_table="${TF_DYNAMO:-k8s-secrets-lab-tflock}" \
              -backend-config=encrypt=true
          else
            terraform init -reconfigure -backend=false
          fi

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        env:
          TF_IN_AUTOMATION: true
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'us-east-1' }}

