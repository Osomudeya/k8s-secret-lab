# Deploy K8s Manifests — builds app image, pushes to Docker Hub, deploys to cluster.
# Triggers: (1) After Terraform CI completes successfully on main, or (2) push to k8s/app, or (3) manual.
# Targets EKS (aws eks update-kubeconfig). For kind/MicroK8s use spinup.sh (DEPLOY.md).
name: Deploy K8s Manifests

on:
  workflow_dispatch:   # Manual: run from Actions tab
  workflow_run:
    workflows: ["Terraform CI"]
    types: [completed]
    branches: [main]
    # Only run deploy when Terraform succeeded (so infra is ready)
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'app/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-app:
    name: Build and push app image
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    outputs:
      image: ${{ steps.set-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          provenance: false
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/k8s-secrets-lab-app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/k8s-secrets-lab-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: set-image
        run: echo "image=${{ secrets.DOCKERHUB_USERNAME }}/k8s-secrets-lab-app:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-aws:
    name: Deploy to K8s (AWS path)
    runs-on: ubuntu-latest
    needs: build-app
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Get kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name secrets-lab \
            --region us-east-1

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/aws/external-secret.yaml
          kubectl apply -f k8s/aws/deployment.yaml

      - name: Use built app image and wait for rollout
        run: |
          kubectl set image deployment/myapp myapp=${{ needs.build-app.outputs.image }} -n default
          kubectl rollout status deployment/myapp --timeout=120s -n default

      - name: Verify secrets synced
        run: |
          echo "ExternalSecret status:"
          kubectl get externalsecret app-db-secret -n default \
            -o jsonpath='{.status.conditions[0].message}'

          echo ""
          echo "K8s Secret exists:"
          kubectl get secret myapp-database-creds -n default

          echo ""
          echo "Pod env check:"
          POD=$(kubectl get pod -l app=myapp -n default -o jsonpath='{.items[0].metadata.name}')
          kubectl exec $POD -n default -- sh -c 'echo "DB_USERNAME=$DB_USERNAME"'
          # Never print DB_PASSWORD in CI logs!
          kubectl exec $POD -n default -- sh -c '[ -n "$DB_PASSWORD" ] && echo "DB_PASSWORD=****SET****" || echo "DB_PASSWORD=(not set)"'

  deploy-azure:
    name: Deploy to K8s (Azure path)
    runs-on: ubuntu-latest
    needs: build-app
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment: production
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Get AKS credentials
        env:
          AKS_RG: ${{ secrets.AZURE_AKS_RG }}
          AKS_NAME: ${{ secrets.AZURE_AKS_NAME }}
        run: |
          az aks get-credentials \
            --resource-group "${AKS_RG:-k8s-secrets-lab-rg}" \
            --name "${AKS_NAME:-secrets-lab-aks}" \
            --overwrite-existing

      - name: Apply K8s manifests (Azure)
        run: |
          kubectl apply -f k8s/azure/secret-provider-class.yaml
          kubectl apply -f k8s/azure/deployment.yaml

      - name: Use built app image and wait for rollout
        run: |
          kubectl set image deployment/myapp myapp=${{ needs.build-app.outputs.image }} -n default
          kubectl rollout status deployment/myapp --timeout=120s -n default