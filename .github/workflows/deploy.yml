# Deploy K8s Manifests — builds app image, pushes to Docker Hub, deploys to cluster.
# When repo secrets are not set, this workflow skips build/deploy and exits successfully so readers' CI stays green.
# Set AWS_ROLE_ARN, DOCKERHUB_*, etc. per docs/DEPLOY-EKS.md to run full deploy.
name: Deploy K8s Manifests

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'k8s/**'
  #     - 'app/**'
  #     - '.github/workflows/deploy.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME || 'secrets-lab' }}

jobs:
  # Runs when required secrets are missing — CI stays green; message points to docs.
  deploy-skip:
    name: Deploy skipped (no secrets)
    runs-on: ubuntu-latest
    if: secrets.AWS_ROLE_ARN == '' || secrets.DOCKERHUB_USERNAME == ''
    steps:
      - run: |
          echo "## Deploy skipped" >> $GITHUB_STEP_SUMMARY
          echo "Repo secrets (AWS_ROLE_ARN, DOCKERHUB_USERNAME, etc.) are not set." >> $GITHUB_STEP_SUMMARY
          echo "Configure them per [docs/DEPLOY-EKS.md](https://github.com/${{ github.repository }}/blob/main/docs/DEPLOY-EKS.md) to deploy to EKS from CI." >> $GITHUB_STEP_SUMMARY
          echo "For local (MicroK8s/kind), use \`bash spinup.sh\` and [docs/DEPLOY-LOCAL.md](https://github.com/${{ github.repository }}/blob/main/docs/DEPLOY-LOCAL.md)." >> $GITHUB_STEP_SUMMARY

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
            app:
              - 'app/**'

  build-app:
    name: Build and push app image
    runs-on: ubuntu-latest
    needs: changes
    if: secrets.DOCKERHUB_USERNAME != '' && (always() && (needs.changes.result == 'success' && (needs.changes.outputs.app == 'true' || needs.changes.outputs.k8s == 'true') || github.event_name == 'workflow_dispatch'))
    permissions:
      contents: read
    outputs:
      image: ${{ steps.set-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          provenance: false
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/k8s-secrets-lab-app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/k8s-secrets-lab-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: set-image
        run: echo "image=${{ secrets.DOCKERHUB_USERNAME }}/k8s-secrets-lab-app:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-aws:
    name: Deploy to K8s (AWS path)
    runs-on: ubuntu-latest
    needs: [changes, build-app]
    if: secrets.AWS_ROLE_ARN != '' && (always() && needs.changes.result == 'success')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Get kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: No-op when nothing changed
        if: github.event_name != 'workflow_dispatch'
        env:
          APP_CHANGED: ${{ needs.changes.outputs.app }}
          K8S_CHANGED: ${{ needs.changes.outputs.k8s }}
        run: |
          if [ "$APP_CHANGED" != "true" ] && [ "$K8S_CHANGED" != "true" ]; then
            echo "No app/** or k8s/** changes. Exiting successfully."
            exit 0
          fi

      - name: Skip if already running
        run: |
          if kubectl get deploy myapp -n default >/dev/null 2>&1; then
            READY=$(kubectl get deploy myapp -n default -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "")
            DESIRED=$(kubectl get deploy myapp -n default -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "")
            if [ -n "$READY" ] && [ -n "$DESIRED" ] && [ "$READY" = "$DESIRED" ] && [ "$READY" != "0" ]; then
              echo "myapp already running ($READY/$DESIRED ready). Skipping deploy."
              exit 0
            fi
          fi

      - name: Apply Deployment
        run: kubectl apply -f k8s/aws/deployment.yaml

      - name: Set image (if built)
        if: needs.build-app.result == 'success'
        run: |
          IMAGE="${{ needs.build-app.outputs.image }}"
          if [ -n "$IMAGE" ]; then
            kubectl set image deployment/myapp myapp="$IMAGE" -n default
          fi

      - name: Apply ExternalSecret (only when k8s/** changed or manual — avoids unnecessary sync)
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.k8s == 'true'
        run: kubectl apply -f k8s/aws/external-secret.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/myapp --timeout=120s -n default

      - name: Verify secrets synced
        run: |
          echo "ExternalSecret status:"
          kubectl get externalsecret app-db-secret -n default \
            -o jsonpath='{.status.conditions[0].message}'
          echo ""
          echo "K8s Secret exists:"
          kubectl get secret myapp-database-creds -n default

      - name: Verify via app endpoint (ALB or LB)
        env:
          ALB_URL: ${{ secrets.ALB_URL }}
        run: |
          APP_URL=""
          if [ -n "${ALB_URL}" ]; then
            APP_URL="${ALB_URL}"
            echo "Using ALB_URL from secrets"
          else
            LB_HOST=$(kubectl get svc myapp -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            LB_IP=$(kubectl get svc myapp -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$LB_HOST" ]; then
              APP_URL="http://${LB_HOST}"
            elif [ -n "$LB_IP" ]; then
              APP_URL="http://${LB_IP}"
            fi
          fi
          if [ -n "$APP_URL" ]; then
            echo "Checking /secrets/compare..."
            RESULT=$(curl -sf --connect-timeout 10 "${APP_URL}/secrets/compare" || echo '{"all_match":null}')
            echo "$RESULT" | python3 -m json.tool 2>/dev/null || echo "$RESULT"
            echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); exit(0) if d.get('all_match') is not False else (print('WARNING: env/volume mismatch — rotation may be in progress'), exit(0))"
          else
            echo "No ALB/LB address yet — verifying via kubectl exec"
            POD=$(kubectl get pod -l app=myapp -n default -o jsonpath='{.items[0].metadata.name}')
            kubectl exec $POD -n default -- sh -c 'echo "DB_USERNAME=$DB_USERNAME"; [ -n "$DB_PASSWORD" ] && echo "DB_PASSWORD=****SET****" || echo "DB_PASSWORD=(not set)"'
          fi

      - name: Write deploy summary
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ needs.build-app.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          LB_HOST=$(kubectl get svc myapp -n default -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          LB_IP=$(kubectl get svc myapp -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
          if [ -n "$LB_HOST" ]; then
            echo "| **App URL** | http://$LB_HOST |" >> $GITHUB_STEP_SUMMARY
          elif [ -n "$LB_IP" ]; then
            echo "| **App URL** | http://$LB_IP |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **App URL** | *(pending or use port-forward)* |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Cluster** | ${{ env.EKS_CLUSTER_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Set \`ALB_URL\` in repo secrets to pin the verify step to your LoadBalancer URL." >> $GITHUB_STEP_SUMMARY

  # Azure — commented out; uncomment when ready to run Azure path
