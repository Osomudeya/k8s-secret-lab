name: Terraform CI

on:
  workflow_dispatch:   # Manual: "Spin up" — run from Actions tab
  pull_request:
    paths:
      - 'terraform/**'
  push:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write

jobs:
  terraform-aws:
    name: Terraform Plan/Apply — AWS
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: terraform/aws

    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: terraform/aws/.terraform
          key: terraform-${{ hashFiles('terraform/aws/.terraform.lock.hcl') }}
          restore-keys: terraform-

      # OIDC authentication — no AWS access keys stored in GitHub!
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: true

      - name: Terraform Init (S3 backend when TF_BACKEND_BUCKET set — use spinup.sh to set secrets)
        env:
          TF_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
          TF_REGION: ${{ secrets.TF_BACKEND_REGION || secrets.AWS_REGION || 'us-east-1' }}
          TF_DYNAMO: ${{ secrets.TF_BACKEND_DYNAMO }}
        run: |
          if [ -n "$TF_BUCKET" ]; then
            terraform init \
              -backend-config=bucket="$TF_BUCKET" \
              -backend-config=key=k8s-secrets-lab/terraform.tfstate \
              -backend-config=region="${TF_REGION}" \
              -backend-config=dynamodb_table="${TF_DYNAMO:-k8s-secrets-lab-tflock}" \
              -backend-config=encrypt=true
          else
            echo "TF_BACKEND_BUCKET not set — run spinup.sh (with gh auth) to set backend secrets, or configure manually"
            terraform init -backend=false
          fi

      # Format is checked with Terraform 1.7 (above). Use same version locally to avoid drift.
      - name: Terraform Format Check
        run: |
          terraform fmt -recursive
          git diff --exit-code .

      - name: Terraform Validate
        run: terraform validate

      # On PRs: show the plan as a comment — team reviews before merge
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.out
        continue-on-error: true

      - name: Upload plan artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/aws/tfplan

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Job default working-directory is terraform/aws, so plan.out is in cwd
            const planOutput = fs.existsSync('plan.out') ? fs.readFileSync('plan.out', 'utf8') : 'Plan output not captured.';
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${planOutput}
            \`\`\`
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      # On main push or manual run: apply only if plan succeeded
      - name: Terraform Apply
        if: steps.plan.outcome == 'success' && (github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push'))
        run: terraform apply -auto-approve tfplan

      - name: Capture outputs and write summary
        if: steps.plan.outcome == 'success' && (github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push'))
        run: |
          echo "## Terraform outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **secret_arn**: \`(sensitive)\`" >> $GITHUB_STEP_SUMMARY
          echo "- **secret_name**: \`(sensitive)\`" >> $GITHUB_STEP_SUMMARY
          echo "- **eso_role_arn**: \`(sensitive)\`" >> $GITHUB_STEP_SUMMARY
          echo "- **random_password_value**: \`(sensitive)\`" >> $GITHUB_STEP_SUMMARY
          if terraform output -raw next_steps &>/dev/null; then
            echo "- **next_steps**: (see Terraform output)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ALB URL is set by the Deploy workflow after applying the Service; see that run for the app URL." >> $GITHUB_STEP_SUMMARY

