name: Terraform CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-aws:
    name: Terraform Plan/Apply — AWS
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform/aws

    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: terraform/aws/.terraform
          key: terraform-${{ hashFiles('terraform/aws/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: EKS kubeconfig and vars
        env:
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          if [ -n "$EKS_CLUSTER_NAME" ]; then
            aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
            echo "TF_VAR_create_eks=true" >> $GITHUB_ENV
            echo "TF_VAR_use_eks=true" >> $GITHUB_ENV
            echo "TF_VAR_cluster_name=$EKS_CLUSTER_NAME" >> $GITHUB_ENV
            [ -n "$AWS_ROLE_ARN" ] && echo "TF_VAR_github_actions_role_arn=$AWS_ROLE_ARN" >> $GITHUB_ENV
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: true

      - name: Terraform Init
        env:
          TF_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
          TF_REGION: ${{ secrets.TF_BACKEND_REGION || secrets.AWS_REGION || 'us-east-1' }}
          TF_DYNAMO: ${{ secrets.TF_BACKEND_DYNAMO || 'k8s-secrets-lab-tflock' }}
        run: |
          if [ -n "$TF_BUCKET" ]; then
            terraform init -backend-config="bucket=$TF_BUCKET" -backend-config="key=k8s-secrets-lab/terraform.tfstate" -backend-config="region=$TF_REGION" -backend-config="dynamodb_table=$TF_DYNAMO" -backend-config="encrypt=true"
          else
            terraform init -backend=false
          fi

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.out
        continue-on-error: true

      - name: Upload plan
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/aws/tfplan

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = fs.existsSync('terraform/aws/plan.out') ? fs.readFileSync('terraform/aws/plan.out', 'utf8') : 'No plan output.';
            const body = `#### Terraform Plan\n\`\`\`\n${out.length > 60000 ? out.slice(0,60000) + '\n...(truncated)' : out}\n\`\`\``;
            github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body });

      - name: Terraform Apply
        if: steps.plan.outcome == 'success' && (github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push'))
        run: terraform apply -auto-approve tfplan
